<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Secure Juice Shop Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="login-container">
    <h1>Login</h1>
    <p class="subtitle">CSCE 703 - HW3 Part 2 Demo</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="username">
        <span class="error-message" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
        <span class="error-message" id="passwordError"></span>
      </div>

      <button type="submit" id="loginBtn">Login</button>

      <p class="server-message" id="serverMessage"></p>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
